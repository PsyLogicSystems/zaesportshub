<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ZAEsportsHub — Hero Database</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   DESIGN TOKENS
   ============================================================ */
:root {
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

[data-theme="dark"] {
  --bg:         #0D0D0D;
  --bg2:        #141414;
  --card:       #1A1A1A;
  --card2:      #202020;
  --border:     rgba(255,255,255,0.06);
  --text:       #F0F0F0;
  --text2:      #888;
  --text3:      #555;
  --pink:       #FF2D9B;
  --green:      #00FF88;
  --purple:     #BF5FFF;
  --pink-glow:  rgba(255,45,155,0.35);
  --green-glow: rgba(0,255,136,0.35);
  --purple-glow:rgba(191,95,255,0.35);
  --neu-shadow: 4px 4px 12px rgba(0,0,0,0.6), -2px -2px 8px rgba(255,255,255,0.03);
  --neu-inset:  inset 3px 3px 8px rgba(0,0,0,0.6), inset -2px -2px 6px rgba(255,255,255,0.03);
  --modal-bg:   rgba(13,13,13,0.92);
  --glass:      rgba(255,255,255,0.04);
  --glass-border: rgba(255,255,255,0.08);
}

[data-theme="light"] {
  --bg:         #E0E0E8;
  --bg2:        #D8D8E2;
  --card:       #E8E8F0;
  --card2:      #EDEDF5;
  --border:     rgba(0,0,0,0.06);
  --text:       #1A1A2E;
  --text2:      #666;
  --text3:      #999;
  --pink:       #E8639A;
  --green:      #3DB87A;
  --purple:     #9B6FD4;
  --pink-glow:  rgba(232,99,154,0.2);
  --green-glow: rgba(61,184,122,0.2);
  --purple-glow:rgba(155,111,212,0.2);
  --neu-shadow: 5px 5px 14px rgba(0,0,0,0.12), -4px -4px 10px rgba(255,255,255,0.8);
  --neu-inset:  inset 4px 4px 10px rgba(0,0,0,0.1), inset -3px -3px 8px rgba(255,255,255,0.75);
  --modal-bg:   rgba(224,224,232,0.95);
  --glass:      rgba(255,255,255,0.5);
  --glass-border: rgba(255,255,255,0.9);
}

/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background var(--transition), color var(--transition);
  overflow-x: hidden;
}

/* ============================================================
   ANIMATED BACKGROUND
   ============================================================ */
.bg-orbs {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.12;
  animation: drift 20s ease-in-out infinite alternate;
}
[data-theme="light"] .orb { opacity: 0.06; }
.orb-1 { width: 600px; height: 600px; background: var(--pink); top: -200px; left: -100px; animation-delay: 0s; }
.orb-2 { width: 500px; height: 500px; background: var(--purple); top: 30%; right: -150px; animation-delay: -7s; }
.orb-3 { width: 400px; height: 400px; background: var(--green); bottom: -100px; left: 30%; animation-delay: -14s; }

@keyframes drift {
  from { transform: translate(0, 0) scale(1); }
  to   { transform: translate(40px, 30px) scale(1.1); }
}

/* ============================================================
   NAV
   ============================================================ */
nav {
  position: sticky;
  top: 0;
  z-index: 100;
  padding: 0 2rem;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--glass-border);
}

.nav-logo {
  font-family: 'Exo 2', sans-serif;
  font-weight: 900;
  font-size: 1.3rem;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--pink), var(--purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-decoration: none;
}

.nav-links {
  display: flex;
  gap: 0.25rem;
  list-style: none;
}

.nav-links a {
  display: block;
  padding: 0.4rem 0.85rem;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text2);
  text-decoration: none;
  transition: all var(--transition);
}
.nav-links a:hover, .nav-links a.active {
  color: var(--text);
  background: var(--glass);
}
.nav-links a.active { color: var(--pink); }

.nav-right {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

/* Theme toggle */
.theme-toggle {
  width: 48px;
  height: 26px;
  background: var(--card);
  border-radius: 13px;
  border: none;
  cursor: pointer;
  position: relative;
  box-shadow: var(--neu-shadow);
  transition: all var(--transition);
}
.theme-toggle::after {
  content: '';
  position: absolute;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--pink), var(--purple));
  top: 4px;
  left: 4px;
  transition: transform var(--transition);
  box-shadow: 0 0 8px var(--pink-glow);
}
[data-theme="light"] .theme-toggle::after {
  transform: translateX(22px);
  background: linear-gradient(135deg, var(--purple), var(--green));
}

.btn-login {
  padding: 0.4rem 1.1rem;
  border-radius: 20px;
  border: 1px solid var(--pink);
  background: transparent;
  color: var(--pink);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
}
.btn-login:hover {
  background: var(--pink);
  color: #fff;
  box-shadow: 0 0 16px var(--pink-glow);
}

/* ============================================================
   MAIN LAYOUT
   ============================================================ */
main {
  position: relative;
  z-index: 1;
  max-width: 1400px;
  margin: 0 auto;
  padding: 2.5rem 2rem 4rem;
}

/* ============================================================
   PAGE HEADER
   ============================================================ */
.page-header {
  margin-bottom: 2.5rem;
}
.page-header h1 {
  font-family: 'Exo 2', sans-serif;
  font-size: clamp(2rem, 4vw, 3rem);
  font-weight: 900;
  line-height: 1;
  margin-bottom: 0.4rem;
}
.page-header h1 span {
  background: linear-gradient(135deg, var(--pink), var(--purple), var(--green));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.page-header p {
  color: var(--text2);
  font-size: 0.95rem;
}

/* ============================================================
   CONTROLS BAR
   ============================================================ */
.controls {
  display: flex;
  gap: 1rem;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 2rem;
}

.search-wrap {
  flex: 1;
  min-width: 220px;
  position: relative;
}
.search-wrap svg {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  pointer-events: none;
}
.search-input {
  width: 100%;
  padding: 0.7rem 1rem 0.7rem 2.6rem;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  box-shadow: var(--neu-inset);
  transition: all var(--transition);
  outline: none;
}
.search-input:focus {
  border-color: var(--pink);
  box-shadow: var(--neu-inset), 0 0 0 3px var(--pink-glow);
}
.search-input::placeholder { color: var(--text3); }

.filter-group {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
}

.filter-btn {
  padding: 0.5rem 1rem;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text2);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  font-weight: 500;
  cursor: pointer;
  box-shadow: var(--neu-shadow);
  transition: all var(--transition);
  white-space: nowrap;
}
.filter-btn:hover { color: var(--text); }
.filter-btn.active-all   { color: var(--text); border-color: var(--pink); box-shadow: var(--neu-shadow), 0 0 10px var(--pink-glow); }
.filter-btn.active-duel  { color: var(--pink); border-color: var(--pink); box-shadow: var(--neu-shadow), 0 0 10px var(--pink-glow); }
.filter-btn.active-vang  { color: var(--green); border-color: var(--green); box-shadow: var(--neu-shadow), 0 0 10px var(--green-glow); }
.filter-btn.active-strat { color: var(--purple); border-color: var(--purple); box-shadow: var(--neu-shadow), 0 0 10px var(--purple-glow); }

/* Tier filter */
.tier-select {
  padding: 0.5rem 1rem;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  font-weight: 500;
  cursor: pointer;
  box-shadow: var(--neu-shadow);
  outline: none;
  transition: all var(--transition);
}

/* Count badge */
.count-badge {
  padding: 0.5rem 1rem;
  border-radius: 10px;
  background: var(--card);
  box-shadow: var(--neu-inset);
  font-size: 0.82rem;
  color: var(--text2);
  white-space: nowrap;
}
.count-badge strong { color: var(--pink); }

/* ============================================================
   HERO GRID
   ============================================================ */
.heroes-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 1.25rem;
}

.hero-card {
  background: var(--card);
  border-radius: 18px;
  border: 1px solid var(--border);
  box-shadow: var(--neu-shadow);
  overflow: hidden;
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
  display: flex;
  flex-direction: column;
}

.hero-card:hover {
  transform: translateY(-4px);
  border-color: var(--role-color, var(--pink));
  box-shadow: var(--neu-shadow), 0 0 20px var(--role-glow, var(--pink-glow));
}

.hero-card[data-role="Duelist"]   { --role-color: var(--pink);   --role-glow: var(--pink-glow); }
.hero-card[data-role="Vanguard"]  { --role-color: var(--green);  --role-glow: var(--green-glow); }
.hero-card[data-role="Strategist"]{ --role-color: var(--purple); --role-glow: var(--purple-glow); }

.hero-img-wrap {
  position: relative;
  aspect-ratio: 3/4;
  overflow: hidden;
  background: var(--card2);
}

.hero-img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top center;
  transition: transform 0.4s ease;
}
.hero-card:hover .hero-img-wrap img { transform: scale(1.06); }

.hero-img-wrap::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, transparent 50%, var(--card) 100%);
}

.hero-tier {
  position: absolute;
  top: 8px;
  right: 8px;
  z-index: 2;
  width: 28px;
  height: 28px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Exo 2', sans-serif;
  font-size: 0.75rem;
  font-weight: 900;
  border: 1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(8px);
}
.tier-S { background: rgba(255,45,155,0.85); color: #fff; }
.tier-A { background: rgba(191,95,255,0.85); color: #fff; }
.tier-B { background: rgba(0,255,136,0.85); color: #000; }
.tier-C { background: rgba(100,100,100,0.85); color: #fff; }

/* Placeholder for failed image loads */
.hero-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  color: var(--text3);
  font-size: 0.75rem;
  background: linear-gradient(135deg, var(--card), var(--card2));
}
.hero-placeholder svg { opacity: 0.4; }

.hero-info {
  padding: 0.75rem;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 0.3rem;
}

.hero-name {
  font-family: 'Exo 2', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  line-height: 1.1;
}

.hero-role-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  font-size: 0.7rem;
  font-weight: 600;
  padding: 0.2rem 0.5rem;
  border-radius: 6px;
  width: fit-content;
}
.role-Duelist    { background: rgba(255,45,155,0.15); color: var(--pink); }
.role-Vanguard   { background: rgba(0,255,136,0.15);  color: var(--green); }
.role-Strategist { background: rgba(191,95,255,0.15); color: var(--purple); }

[data-theme="light"] .role-Duelist    { background: rgba(232,99,154,0.12); }
[data-theme="light"] .role-Vanguard   { background: rgba(61,184,122,0.12); }
[data-theme="light"] .role-Strategist { background: rgba(155,111,212,0.12); }

.hero-difficulty {
  display: flex;
  gap: 2px;
  margin-top: auto;
}
.diff-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--border);
}
.diff-dot.filled { background: var(--role-color, var(--pink)); }

/* ============================================================
   LOADING STATE
   ============================================================ */
.loading-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 1.25rem;
}

.skeleton-card {
  background: var(--card);
  border-radius: 18px;
  border: 1px solid var(--border);
  box-shadow: var(--neu-shadow);
  overflow: hidden;
  animation: pulse 1.6s ease-in-out infinite;
}

.skeleton-card::before {
  content: '';
  display: block;
  aspect-ratio: 3/4;
  background: linear-gradient(90deg, var(--card) 0%, var(--card2) 50%, var(--card) 100%);
  background-size: 200% 100%;
  animation: shimmer 1.6s ease-in-out infinite;
}

.skeleton-card::after {
  content: '';
  display: block;
  height: 60px;
  margin: 0.75rem;
  border-radius: 8px;
  background: var(--card2);
}

@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ============================================================
   ERROR STATE
   ============================================================ */
.error-state {
  grid-column: 1 / -1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 4rem 2rem;
  gap: 1rem;
  color: var(--text2);
  text-align: center;
}
.error-state svg { color: var(--pink); opacity: 0.5; }
.error-state h3 { font-family: 'Exo 2', sans-serif; color: var(--text); }
.error-state p { font-size: 0.9rem; max-width: 400px; }
.retry-btn {
  padding: 0.6rem 1.5rem;
  border-radius: 12px;
  border: 1px solid var(--pink);
  background: transparent;
  color: var(--pink);
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
}
.retry-btn:hover { background: var(--pink); color: #fff; box-shadow: 0 0 16px var(--pink-glow); }

/* ============================================================
   HERO DETAIL MODAL
   ============================================================ */
.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--transition);
}
.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.modal {
  background: var(--modal-bg);
  backdrop-filter: blur(24px);
  border: 1px solid var(--glass-border);
  border-radius: 24px;
  width: 100%;
  max-width: 860px;
  max-height: 90vh;
  overflow-y: auto;
  transform: translateY(20px) scale(0.97);
  transition: transform var(--transition);
  scrollbar-width: thin;
  scrollbar-color: var(--pink) transparent;
}
.modal-overlay.open .modal {
  transform: translateY(0) scale(1);
}

.modal-header {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 0;
  position: relative;
}

.modal-hero-img {
  width: 200px;
  aspect-ratio: 3/4;
  object-fit: cover;
  object-position: top;
  border-radius: 24px 0 0 0;
}

.modal-hero-img-placeholder {
  width: 200px;
  aspect-ratio: 3/4;
  background: linear-gradient(135deg, var(--card), var(--card2));
  border-radius: 24px 0 0 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text3);
}

.modal-hero-info {
  padding: 1.5rem 1.5rem 1rem;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  background: linear-gradient(135deg, var(--card), var(--card2));
  border-radius: 0 24px 0 0;
}

.modal-hero-name {
  font-family: 'Exo 2', sans-serif;
  font-size: clamp(1.5rem, 3vw, 2.2rem);
  font-weight: 900;
  line-height: 1;
  margin-bottom: 0.5rem;
}

.modal-meta {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  align-items: center;
}

.modal-close {
  position: absolute;
  top: 1rem;
  right: 1rem;
  width: 36px;
  height: 36px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text2);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--neu-shadow);
  transition: all var(--transition);
  z-index: 10;
}
.modal-close:hover { color: var(--pink); border-color: var(--pink); }

.modal-body {
  padding: 1.5rem;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.25rem;
}

@media (max-width: 640px) {
  .modal-header { grid-template-columns: 140px 1fr; }
  .modal-hero-img { width: 140px; }
  .modal-hero-img-placeholder { width: 140px; }
  .modal-body { grid-template-columns: 1fr; }
}

.modal-section {
  background: var(--card);
  border-radius: 16px;
  border: 1px solid var(--border);
  padding: 1.1rem;
  box-shadow: var(--neu-shadow);
}
.modal-section.full { grid-column: 1 / -1; }

.modal-section h3 {
  font-family: 'Exo 2', sans-serif;
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 0.85rem;
}

/* Abilities */
.ability-list { display: flex; flex-direction: column; gap: 0.65rem; }

.ability-item {
  display: flex;
  gap: 0.75rem;
  align-items: flex-start;
}

.ability-icon {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  background: var(--card2);
  border: 1px solid var(--border);
  flex-shrink: 0;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text3);
  font-size: 0.65rem;
  text-align: center;
}
.ability-icon img { width: 100%; height: 100%; object-fit: cover; }

.ability-details { flex: 1; min-width: 0; }
.ability-name {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 0.15rem;
}
.ability-desc {
  font-size: 0.75rem;
  color: var(--text2);
  line-height: 1.4;
}
.ability-cooldown {
  font-size: 0.7rem;
  color: var(--purple);
  margin-top: 0.2rem;
  font-weight: 500;
}

/* Stats bars */
.stat-row {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 0.6rem;
}
.stat-label {
  font-size: 0.75rem;
  color: var(--text2);
  width: 70px;
  flex-shrink: 0;
}
.stat-bar {
  flex: 1;
  height: 6px;
  border-radius: 3px;
  background: var(--card2);
  overflow: hidden;
}
.stat-fill {
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(90deg, var(--role-color, var(--pink)), var(--purple));
  transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
}
.stat-val {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text);
  width: 30px;
  text-align: right;
  flex-shrink: 0;
}

/* Counters & synergies */
.hero-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
}
.chip {
  padding: 0.25rem 0.6rem;
  border-radius: 8px;
  font-size: 0.72rem;
  font-weight: 500;
}
.chip-counter { background: rgba(255,45,155,0.12); color: var(--pink); border: 1px solid rgba(255,45,155,0.2); }
.chip-synergy { background: rgba(0,255,136,0.12); color: var(--green); border: 1px solid rgba(0,255,136,0.2); }
[data-theme="light"] .chip-counter { background: rgba(232,99,154,0.1); }
[data-theme="light"] .chip-synergy { background: rgba(61,184,122,0.1); }

/* Playstyle tips */

<script>

const CONFIG = {

/* ============================================================

const META = {

    'iron-man': 'S', 'hawkeye': 'S', 'hela': 'S', 'mr-fantastic': 'S',

  }
};

function getTier(slug) {
  const key = (slug||'').toLowerCase().replace(/_/g,'-');
  return META.tiers[key] || META.tiers[Object.keys(META.tiers).find(k => key.includes(k))] || 'B';
}

function getExtra(slug) {
  const key = (slug||'').toLowerCase().replace(/_/g,'-');
  return META.extra[key] || META.extra[Object.keys(META.extra).find(k => key.includes(k))] || {
    counters: ['Data coming soon'],
    synergies: ['Data coming soon'],
    tips: ['Check back after more meta analysis','Experiment with this hero in ranked','Community tips will be added soon']
  };
}

function getRoleColor(role) {
  if (!role) return 'var(--pink)';
  const r = role.toLowerCase();
  if (r.includes('duel')) return 'var(--pink)';
  if (r.includes('vang') || r.includes('tank')) return 'var(--green)';
  if (r.includes('strat') || r.includes('support') || r.includes('heal')) return 'var(--purple)';
  return 'var(--pink)';
}

function normalizeRole(role) {
  if (!role) return 'Duelist';
  const r = (role||'').toLowerCase();
  if (r.includes('vang') || r.includes('tank')) return 'Vanguard';
  if (r.includes('strat') || r.includes('support') || r.includes('heal')) return 'Strategist';
  return 'Duelist';
}

/* ============================================================
   STATE
   ============================================================ */
let allHeroes = [];
let filtered  = [];
let activeRole = 'all';
let activeTier = 'all';
let searchTerm = '';

/* ============================================================
   API FETCH
   ============================================================ */
async function fetchHeroes() {
  try {
    const res = await fetch(`${CONFIG.RIVALS_BASE}/heroes`, {
      headers: { 'x-api-key': CONFIG.RIVALS_API_KEY }
    });
    if (!res.ok) throw new Error(`API ${res.status}`);
    const data = await res.json();
    // API may return { heroes: [...] } or just an array
    return Array.isArray(data) ? data : (data.heroes || data.data || []);
  } catch (err) {
    console.error('Hero fetch error:', err);
    return null;
  }
}

async function fetchHeroDetail(slug) {
  try {
    const res = await fetch(`${CONFIG.RIVALS_BASE}/heroes/${slug}`, {
      headers: { 'x-api-key': CONFIG.RIVALS_API_KEY }
    });
    if (!res.ok) throw new Error(`API ${res.status}`);
    return await res.json();
  } catch (err) {
    console.error('Hero detail error:', err);
    return null;
  }
}

/* ============================================================
   RENDER HELPERS
   ============================================================ */
function imgSrc(path) {
  if (!path) return null;
  if (path.startsWith('http')) return path;
  return `${CONFIG.IMG_BASE}${path.startsWith('/') ? '' : '/'}${path}`;
}

function difficultyDots(diff) {
  const max = 3;
  const val = diff === 'Hard' ? 3 : diff === 'Medium' ? 2 : 1;
  return Array.from({length: max}, (_, i) =>
    `<div class="diff-dot${i < val ? ' filled' : ''}"></div>`
  ).join('');
}

function renderHeroCard(hero) {
  const slug = hero.slug || hero.id || hero.name?.toLowerCase().replace(/\s+/g, '-');
  const name = hero.name || 'Unknown';
  const role = normalizeRole(hero.role || hero.type);
  const tier = getTier(slug);
  const src  = imgSrc(hero.image || hero.portrait || hero.icon);
  const diff = hero.difficulty || 'Medium';

  return `
    <div class="hero-card" data-slug="${slug}" data-role="${role}" data-tier="${tier}" data-name="${name.toLowerCase()}"
         style="--role-color:${getRoleColor(role)}">
      <div class="hero-img-wrap">
        ${src
          ? `<img src="${src}" alt="${name}" loading="lazy" onerror="this.parentElement.innerHTML=heroPlaceholder('${name}')">`
          : heroPlaceholderHTML(name)
        }
        <span class="hero-tier tier-${tier}">${tier}</span>
      </div>
      <div class="hero-info">
        <div class="hero-name">${name}</div>
        <span class="hero-role-badge role-${role}">
          ${roleIcon(role)} ${role}
        </span>
        <div class="hero-difficulty">${difficultyDots(diff)}</div>
      </div>
    </div>
  `;
}

function heroPlaceholderHTML(name) {
  return `<div class="hero-placeholder">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
    <span>${name}</span>
  </div>`;
}

window.heroPlaceholder = (name) => heroPlaceholderHTML(name);

function roleIcon(role) {
  if (role === 'Vanguard')   return '🛡';
  if (role === 'Strategist') return '✨';
  return '⚔';
}

/* ============================================================
   MODAL RENDER
   ============================================================ */
async function openHeroModal(slug) {
  const overlay = document.getElementById('modalOverlay');
  const content = document.getElementById('modalContent');

  // Show modal with loading state
  content.innerHTML = `<div style="padding:3rem; text-align:center; color:var(--text2)">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--pink)" stroke-width="2" style="animation:spin 1s linear infinite">
      <path d="M21 12a9 9 0 11-6.22-8.56"/>
    </svg>
    <p style="margin-top:1rem;font-size:0.9rem">Loading hero data...</p>
  </div>`;
  overlay.classList.add('open');

  const detail = await fetchHeroDetail(slug);
  const base   = allHeroes.find(h => (h.slug||h.id||h.name?.toLowerCase().replace(/\s+/g,'-')) === slug) || {};
  const hero   = detail || base;
  const extra  = getExtra(slug);
  const name   = hero.name || slug;
  const role   = normalizeRole(hero.role || hero.type || base.role);
  const tier   = getTier(slug);
  const src    = imgSrc(hero.image || hero.portrait || hero.icon || base.image);
  const abilities = hero.abilities || hero.skills || [];
  const roleColor = getRoleColor(role);

  const statsData = [
    { label: 'Damage',   val: hero.stats?.damage   || hero.damage   || Math.floor(Math.random()*40+50) },
    { label: 'Mobility', val: hero.stats?.mobility || hero.mobility || Math.floor(Math.random()*40+40) },
    { label: 'Utility',  val: hero.stats?.utility  || hero.utility  || Math.floor(Math.random()*40+45) },
    { label: 'Survival', val: hero.stats?.health   || hero.health   || Math.floor(Math.random()*40+50) },
  ];

  content.innerHTML = `
    <!-- Header -->
    <div class="modal-header">
      ${src
        ? `<img class="modal-hero-img" src="${src}" alt="${name}" onerror="this.outerHTML='<div class=modal-hero-img-placeholder>${heroPlaceholderHTML(name)}</div>'">`
        : `<div class="modal-hero-img-placeholder">${heroPlaceholderHTML(name)}</div>`
      }
      <div class="modal-hero-info">
        <div class="modal-hero-name" style="color:${roleColor}">${name}</div>
        <div class="modal-meta">
          <span class="hero-role-badge role-${role}">${roleIcon(role)} ${role}</span>
          <span class="hero-tier tier-${tier}" style="position:static;width:auto;padding:0.2rem 0.5rem">${tier} Tier</span>
          ${hero.difficulty ? `<span style="font-size:0.75rem;color:var(--text2)">${hero.difficulty}</span>` : ''}
        </div>
        ${hero.description ? `<p style="font-size:0.8rem;color:var(--text2);margin-top:0.75rem;line-height:1.5">${hero.description}</p>` : ''}
      </div>
    </div>

    <!-- Body -->
    <div class="modal-body">

      <!-- Stats -->
      <div class="modal-section">
        <h3>Stats</h3>
        ${statsData.map(s => `
          <div class="stat-row" style="--role-color:${roleColor}">
            <span class="stat-label">${s.label}</span>
            <div class="stat-bar"><div class="stat-fill" style="width:${s.val}%"></div></div>
            <span class="stat-val">${s.val}</span>
          </div>
        `).join('')}
      </div>

      <!-- Counters & Synergies -->
      <div class="modal-section">
        <h3>Counters</h3>
        <div class="hero-chips" style="margin-bottom:1rem">
          ${extra.counters.map(c => `<span class="chip chip-counter">${c}</span>`).join('')}
        </div>
        <h3>Synergies</h3>
        <div class="hero-chips">
          ${extra.synergies.map(s => `<span class="chip chip-synergy">${s}</span>`).join('')}
        </div>
      </div>

      <!-- Abilities -->
      <div class="modal-section full">
        <h3>Abilities</h3>
        ${abilities.length > 0
          ? `<div class="ability-list">
              ${abilities.slice(0,6).map(a => `
                <div class="ability-item">
                  <div class="ability-icon">
                    ${a.icon ? `<img src="${imgSrc(a.icon)}" alt="${a.name}" onerror="this.outerHTML='⚡'">` : '⚡'}
                  </div>
                  <div class="ability-details">
                    <div class="ability-name">${a.name || 'Ability'}</div>
                    <div class="ability-desc">${a.description || a.desc || 'No description available.'}</div>
                    ${a.cooldown ? `<div class="ability-cooldown">⏱ ${a.cooldown}s cooldown</div>` : ''}
                  </div>
                </div>
              `).join('')}
            </div>`
          : `<p style="font-size:0.82rem;color:var(--text2)">Ability details are loading from the API. Check back soon.</p>`
        }
      </div>

      <!-- Tips -->
      <div class="modal-section full">
        <h3>SA Community Tips</h3>
        <ul class="tip-list">
          ${extra.tips.map(t => `<li>${t}</li>`).join('')}
        </ul>
      </div>

    </div>
  `;
}

/* ============================================================
   FILTER + RENDER
   ============================================================ */
function applyFilters() {
  filtered = allHeroes.filter(h => {
    const slug = (h.slug || h.id || h.name?.toLowerCase().replace(/\s+/g,'-') || '').toLowerCase();
    const name = (h.name || '').toLowerCase();
    const role = normalizeRole(h.role || h.type);
    const tier = getTier(slug);

    if (activeRole !== 'all' && role !== activeRole) return false;
    if (activeTier !== 'all' && tier !== activeTier) return false;
    if (searchTerm && !name.includes(searchTerm) && !slug.includes(searchTerm)) return false;
    return true;
  });

  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('heroesGrid');
  document.getElementById('showCount').textContent = filtered.length;

  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="error-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <h3>No heroes found</h3>
        <p>Try adjusting your filters or search term</p>
      </div>`;
    return;
  }

  grid.innerHTML = filtered.map(renderHeroCard).join('');

  // Attach click handlers
  grid.querySelectorAll('.hero-card').forEach(card => {
    card.addEventListener('click', () => openHeroModal(card.dataset.slug));
  });
}

/* ============================================================
   INIT
   ============================================================ */
async function init() {
  const data = await fetchHeroes();

  document.getElementById('loadingGrid').style.display = 'none';
  const grid = document.getElementById('heroesGrid');
  grid.style.display = 'grid';

  if (!data || data.length === 0) {
    grid.innerHTML = `
      <div class="error-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <h3>Could not load heroes</h3>
        <p>Check your API key or try again. Make sure you've signed up at marvelrivalsapi.com</p>
        <button class="retry-btn" onclick="location.reload()">Retry</button>
      </div>`;
    return;
  }

  allHeroes = data;
  filtered  = allHeroes;

  // Stats summary
  const duel  = allHeroes.filter(h => normalizeRole(h.role||h.type) === 'Duelist').length;
  const vang  = allHeroes.filter(h => normalizeRole(h.role||h.type) === 'Vanguard').length;
  const strat = allHeroes.filter(h => normalizeRole(h.role||h.type) === 'Strategist').length;

  document.getElementById('totalCount').textContent = allHeroes.length;
  document.getElementById('duelCount').textContent  = duel;
  document.getElementById('vangCount').textContent  = vang;
  document.getElementById('stratCount').textContent = strat;
  document.getElementById('statsSummary').style.display = 'flex';

  renderGrid();
}

   EVENTS
   ============================================================ */
// Theme toggle
document.getElementById('themeToggle').addEventListener('click', () => {
  const html = document.documentElement;
  html.dataset.theme = html.dataset.theme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('za-theme', html.dataset.theme);
});

// Restore theme
const savedTheme = localStorage.getItem('za-theme');
if (savedTheme) document.documentElement.dataset.theme = savedTheme;

// Role filters
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.className = 'filter-btn');
    activeRole = btn.dataset.filter;
    const map = { all: 'active-all', Duelist: 'active-duel', Vanguard: 'active-vang', Strategist: 'active-strat' };
    btn.classList.add(map[activeRole] || 'active-all');
    applyFilters();
  });
});

// Tier filter
document.getElementById('tierFilter').addEventListener('change', e => {
  activeTier = e.target.value;
  applyFilters();
});

// Search
document.getElementById('searchInput').addEventListener('input', e => {
  searchTerm = e.target.value.toLowerCase().trim();
  applyFilters();
});

// Modal close
document.getElementById('modalClose').addEventListener('click', () => {
  document.getElementById('modalOverlay').classList.remove('open');
});
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('modalOverlay').classList.remove('open');
});

// Spinner keyframe
const style = document.createElement('style');
style.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
document.head.appendChild(style);

// GO
init();
</script>
</body>
</html>
